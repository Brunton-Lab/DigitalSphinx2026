# Sphinx Training - CPU Environment
#
# Install with: conda env create -f environment-cpu.yaml
# Activate with: conda activate sphinx-cpu
#
# For GPU-accelerated installation, use environment-gpu.yaml instead

name: sphinx-cpu
channels:
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.12

  # Core scientific computing
  - numpy>=1.24
  - scipy>=1.10
  - matplotlib>=3.7
  - seaborn
  - pandas>=2.0
  - h5py>=3.8

  # Configuration management
  - hydra-core>=1.3
  - omegaconf>=2.3
  - pyyaml

  # Utilities
  - tqdm
  - psutil
  - pillow
  - natsort

  # Install pip packages
  - pip
  - pip:
      # JAX (CPU)
      - jax>=0.4.0
      - jaxlib>=0.4.0

      # ML / training
      - flax
      - optax
      - orbax-checkpoint>=0.11

      # MuJoCo and physics simulation
      - mujoco>=3.2.0
      - mujoco-mjx>=3.2.0
      - dm-control
      - brax>=0.9.0
      - playground

      # Configuration
      - ml_collections

      # Visualization & media
      - mediapy
      - imageio[ffmpeg]
      - opencv-python

      # Logging
      - wandb[media]

      # Utilities
      - absl-py
      - etils
      - jax_tqdm
      - uv

      # Install local package in editable mode
      # Run after environment creation:
      #   pip install -e .
